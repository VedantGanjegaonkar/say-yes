<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Say Yes No No 💌</title>
    <meta name="description" content="No login · one link · pure charm. Design a playful little ask and send it as a single private link they'll actually say yes to." />

    <!-- Social preview for the home page. Per-link /f/:slug previews are served
         to crawlers by api/link-preview.js. %OG_BASE% is replaced at build time
         with VITE_SITE_URL (see vite.config.js); if unset it falls back to a
         relative path. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Say Yes No No" />
    <meta property="og:title" content="Build a date they'll actually say yes to" />
    <meta property="og:description" content="No login · one link · pure charm. Design a playful little ask and send it as a single private link." />
    <meta property="og:url" content="%OG_BASE%/" />
    <meta property="og:image" content="%OG_BASE%/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Build a date they'll actually say yes to" />
    <meta name="twitter:description" content="No login · one link · pure charm. Design a playful little ask and send it as a single private link." />
    <meta name="twitter:image" content="%OG_BASE%/og-cover.png" />
    <meta name="theme-color" content="#7c6bff" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
